name: Terraform Module Version Guard

# Runs on every PR. The job below becomes a required status check
# (see README) so an outdated module reference HARD-BLOCKS the merge.
on:
  pull_request:
    paths:
      - "**/*.tf"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post/update the report comment

jobs:
  module-version-guard:           # <-- this exact name is what you mark "Required"
    name: module-version-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run version guard
        id: guard
        env:
          SCAN_ROOT: "."
          REPORT_FILE: "report.md"
          # Set to "true" to also fail on modules that have no version pin:
          FAIL_ON_UNPINNED: "false"
        run: |
          set +e
          python .github/scripts/check_module_versions.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post / update report comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const marker = '<!-- tf-module-version-guard -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner, repo, issue_number, body });
            }

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-version-report
          path: report.md

      - name: Enforce result (block PR if outdated)
        if: steps.guard.outputs.exit_code != '0'
        run: |
          echo "::error::Outdated or unresolved Terraform module references found. See the PR comment for details."
          exit 1
